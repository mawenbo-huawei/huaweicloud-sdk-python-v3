[tox]
envlist = py37, py38, py39, py310, py311, py312, py313

[testenv]
deps =
    pytest
    pytest-cov
    pytest-mock
    requests-mock
    responses
    requests-toolbelt>=0.10.1
    six>=1.16.0
    simplejson>=3.18.0
    PyYAML>=5.4.1
    pyasn1>=0.5.0
    certifi>=2022.12.7
    typing_extensions
    pymongo
    defusedxml
commands =
    pytest --cov=huaweicloudsdkcore {posargs}

[pytest]
testpaths = tests
